<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Shrikant, From Divya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>

<style>
body{
  background:#1A0F00;
  color:#FDF4E3;
  font-family:'Lora',serif;
  text-align:center;
  padding:40px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:40px;
}
.btn{
  padding:15px 30px;
  margin:15px;
  font-size:16px;
  cursor:pointer;
  border:none;
}
.btn-yes{
  background:#D4820A;
  color:white;
}
.btn-no{
  background:transparent;
  color:#ccc;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>For Shrikant</h1>

<p style="max-width:600px;margin:auto;line-height:1.8;">
Shrikant, I have been sitting with something heavy on my chest for a long time now. 
I was rude to you. Not once by accident — but repeatedly, carelessly. I am truly sorry.
These days without you made me realize how much you matter to me.
</p>

<br><br>

<h2>Will you give us another chance?</h2>

<div>
  <button class="btn btn-yes"
    onclick="window.location.href='https://wa.me/919130614142?text=Yes%2C%20let%27s%20begin%20again%20🤍'">
    Yes, let's begin again 🤍
  </button>

  <button class="btn btn-no"
    onclick="window.location.href='https://wa.me/919130614142?text=I%20need%20a%20little%20more%20time'">
    I need a little more time
  </button>
</div>

</body>
</html>
